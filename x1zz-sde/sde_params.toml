# ============================================================
# x1zz-sde — SDE 파라미터 파일
# 서울시 공공 대기질 데이터(2008-2022) 기반 통계값
# ============================================================

[meta]
rows       = 10_000
seed       = 42
output_dir = "x1zz-sde/data/generated"

# ────────────────────────────────────────────────────────────
# 컬럼 정의
# ────────────────────────────────────────────────────────────

[columns.pm25]
kind   = "normal"
mean   = 24.8          # μg/m³  (서울 연평균)
std    = 11.6
min    = 0.0
max    = 200.0

[columns.traffic]
kind   = "poisson"
lambda = 3200.0        # 시간당 통과 차량 (대)

[columns.temperature]
kind   = "normal"
mean   = 13.5          # °C (서울 연평균)
std    = 9.2
min    = -20.0
max    = 40.0

[columns.humidity]
kind   = "normal"
mean   = 62.0          # % 상대습도
std    = 18.5
min    = 0.0
max    = 100.0

[columns.wind_speed]
kind   = "normal"
mean   = 2.8           # m/s
std    = 1.4
min    = 0.0
max    = 20.0

[columns.district]
kind     = "categorical"
choices  = ["강남구","강북구","강서구","노원구","마포구","서초구","송파구","중구","종로구","영등포구"]
weights  = [0.12, 0.10, 0.11, 0.10, 0.09, 0.10, 0.12, 0.09, 0.08, 0.09]

# ────────────────────────────────────────────────────────────
# 상관관계 파라미터 (LazyFrame 체인에서 주입)
# pm25_corr = a * traffic + b + N(0, noise_std)
# ────────────────────────────────────────────────────────────

[correlations]
pm25_traffic_a     = 0.0041   # 회귀 기울기
pm25_traffic_b     = 10.2     # 절편
pm25_traffic_noise = 6.3      # σ (추가 노이즈)

# ────────────────────────────────────────────────────────────
# 변형(Mutation) 파라미터
# ────────────────────────────────────────────────────────────

[mutation]
null_ratio      = 0.03   # 3% null 주입
hard_case_ratio = 0.01   # 1% 극단값 주입
pm25_spike_val  = 185.0  # 극단 pm25 (황사 이벤트)

# ────────────────────────────────────────────────────────────
# 품질 검증 임계값
# ────────────────────────────────────────────────────────────

[benchmark]
corr_tolerance = 0.35    # 이론 상관계수 대비 허용 오차 ±35% (r~0.037 소규모 표본 오차 포함)
null_tolerance = 0.005   # null 비율 허용 오차 ±0.5%
