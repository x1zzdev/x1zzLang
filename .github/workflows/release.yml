name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build · ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name:    windows-x64
            runner:  windows-latest
            target:  x86_64-pc-windows-msvc

          - name:    linux-x64
            runner:  ubuntu-latest
            target:  x86_64-unknown-linux-gnu

          - name:    macos-x64
            runner:  macos-13
            target:  x86_64-apple-darwin

          - name:    macos-arm64
            runner:  macos-latest
            target:  aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --no-self-update --profile minimal
          rustup default stable
          rustup target add ${{ matrix.platform.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: registry-${{ matrix.platform.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: registry-${{ matrix.platform.target }}-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: build-${{ matrix.platform.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('src/**/*.rs', 'x1zz-*/src/**/*.rs') }}
          restore-keys: |
            build-${{ matrix.platform.target }}-${{ hashFiles('**/Cargo.lock') }}-
            build-${{ matrix.platform.target }}-

      - name: Build x1zz
        run: cargo build --release -p x1zz --target ${{ matrix.platform.target }}

      - name: Build x1zz-runner
        run: cargo build --release -p x1zz-runner --target ${{ matrix.platform.target }}

      - name: Build x1zz-exec
        run: cargo build --release -p x1zz-exec --target ${{ matrix.platform.target }}

      - name: Stage and package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          
          $version  = "${{ github.ref_name }}"
          $platform = "${{ matrix.platform.name }}"
          $target   = "${{ matrix.platform.target }}"
          $dist     = "dist\x1zz"
          $out      = "x1zz-${version}-${platform}.zip"

          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $binaries = Get-ChildItem "target\${target}\release" -Filter "*.exe" |
            Where-Object { $_.Name -match '^x1zz' }

          if ($binaries.Count -eq 0) {
            Write-Error "ERROR: No binaries found for Windows packaging."
            exit 1
          }

          foreach ($binary in $binaries) {
            Copy-Item $binary.FullName -Destination $dist
          }

          if (Test-Path "examples") { Copy-Item -Recurse "examples" "$dist\examples" }
          if (Test-Path "config")   { Copy-Item -Recurse "config"   "$dist\config"   }

          Compress-Archive -Path "dist\x1zz" -DestinationPath $out
          "ARCHIVE=${out}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Stage and package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          PLATFORM="${{ matrix.platform.name }}"
          TARGET="${{ matrix.platform.target }}"
          DIST="dist/x1zz"
          OUT="x1zz-${VERSION}-${PLATFORM}.tar.gz"

          mkdir -p "${DIST}"

          binaries=$(find "target/${TARGET}/release" -maxdepth 1 -type f -name 'x1zz*' \
            ! -name '*.d' ! -name '*.rlib' ! -name '*.rmeta')

          if [ -z "$binaries" ]; then
            echo "ERROR: No binaries found for Unix packaging."
            exit 1
          fi

          for binary in $binaries; do
            cp "$binary" "${DIST}/"
          done

          [ -d examples ] && cp -r examples "${DIST}/examples"
          [ -d config   ] && cp -r config   "${DIST}/config"

          tar -czf "${OUT}" -C dist x1zz
          echo "ARCHIVE=${OUT}" >> "$GITHUB_ENV"

      - name: Validate archive exists
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=( x1zz-* )
          if [ ${#files[@]} -eq 0 ]; then
            echo "ERROR: no archive produced"
            exit 1
          fi
          echo "Archive ready: ${files[*]}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.platform.name }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true
          path: release/

      - name: Validate artifacts
        shell: bash
        run: |
          set -euo pipefail
          echo "── release/ contents ──────────────────────────"
          ls -lh release/

          shopt -s nullglob
          archives=( release/x1zz-* )

          if [ ${#archives[@]} -ne 4 ]; then
            echo "ERROR: expected 4 archives, found ${#archives[@]}"
            exit 1
          fi

          for f in "${archives[@]}"; do
            if [[ ! "$f" =~ ^release/x1zz-.* ]]; then
              echo "ERROR: Unexpected archive name: $f"
              exit 1
            fi
            echo "OK: $f"
          done

      - name: Generate checksums
        shell: bash
        run: |
          cd release
          sha256sum * > checksums.sha256
          echo "── checksums ──────────────────────────────────"
          cat checksums.sha256

      - name: Generate release notes
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          PREV=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -v "^${VERSION}$" \
            | head -1)

          {
            echo "## What's Changed"
            echo ""
            if [ -n "${PREV}" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV}..HEAD"
            else
              git log --pretty=format:"- %s (%h)" HEAD
            fi
            echo ""
            echo ""
            echo "---"
            echo ""
            echo "## Included Binaries"
            echo ""
            echo "| Binary | Role |"
            echo "|--------|------|"
            echo "| \`x1zz\` | CLI entry point |"
            echo "| \`x1zz-runner\` | IPC bridge |"
            echo "| \`x1zz-exec\` | Polars-powered runtime engine |"
            echo ""
            echo "## Installation"
            echo ""
            echo "1. Download the archive for your platform"
            echo "2. Extract — all binaries land in \`x1zz/\`"
            echo "3. Add \`x1zz/\` to your \`PATH\`"
            echo "4. Run \`x1zz --help\`"
            echo ""
            echo "> ⚠️ All three binaries must remain in the same directory."
          } > release_notes.md

      - name: Create GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"

          PRERELEASE=""
          echo "${VERSION}" | grep -q '-' && PRERELEASE="--prerelease"

          shopt -s nullglob
          archives=( release/*.zip release/*.tar.gz )

          if [ ${#archives[@]} -eq 0 ]; then
            echo "ERROR: no artifacts to release"
            exit 1
          fi

          gh release create "${VERSION}" \
            --title "x1zzLang ${VERSION}" \
            --notes-file release_notes.md \
            ${PRERELEASE} \
            "${archives[@]}" \
            release/checksums.sha256